<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBI Return Package Logger</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --border: #dfe1e6;
            --locked-bg: #ebecf0;
            --locked-text: #5e6c84;
            --history-bg: #f8fafc;
            --history-hover: #eff6ff;
            --danger: #ef4444;
        }
        
        body[data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --locked-bg: #020617;
            --locked-text: #94a3b8;
            --history-bg: #0f172a;
            --history-hover: #1e293b;
            --danger: #f87171;
        }

        /* Apply Roboto globally */
        * {
            font-family: 'Roboto', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-size: 16px; /* Base industry standard size */
        }

        .header-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .theme-toggle:hover { border-color: var(--primary); }

        .form-container {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            transition: background-color 0.3s ease;
        }
        
        h2 { margin-top: 0; text-align: center; font-size: 24px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; opacity: 0.9;}
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 4px; font-size: 16px; /* 16px prevents iOS zoom */
            background-color: var(--surface); color: var(--text); transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

        .locked-field {
            background-color: var(--locked-bg); color: var(--locked-text); cursor: not-allowed; border: 1px solid var(--border);
        }
        textarea { resize: vertical; height: 80px; }
        
        button.btn-submit {
            width: 100%; padding: 14px; background-color: var(--primary); color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button.btn-submit:hover { background-color: var(--primary-hover); }
        button.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .message { margin-top: 16px; padding: 12px; border-radius: 4px; text-align: center; display: none; font-weight: bold; font-size: 14px;}
        .success { background-color: #e3fcef; color: #006644; display: block; }
        .error { background-color: #ffebe6; color: #bf2600; display: block; }

        /* --- Expanded Local History Memory Panel --- */
        .history-section { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 16px; }
        
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .history-header h3 { font-size: 14px; color: var(--text); opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; font-weight: 700;}
        
        .btn-clear { 
            background: transparent; border: 1px solid var(--danger); color: var(--danger); 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .btn-clear:hover { background: var(--danger); color: white; }

        .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 5px;}
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 10px; }

        .history-item { 
            padding: 14px; border: 1px solid var(--border); border-radius: 6px; 
            background: var(--history-bg); cursor: pointer; transition: 0.2s; 
        }
        .history-item:hover { border-color: var(--primary); background: var(--history-hover); }
        
        .history-item-top { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); font-size: 15px; margin-bottom: 8px;}
        .history-item-date { font-size: 13px; color: var(--text); opacity: 0.6; font-weight: normal; }
        
        .history-details { color: var(--text); opacity: 0.85; font-size: 14px; line-height: 1.5; }
        .history-details strong { font-weight: 600; opacity: 1; }
        .history-address { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 13px; white-space: pre-wrap;}
    </style>
</head>
<body data-theme="light">

<div class="header-bar">
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
</div>

<div class="form-container">
    <h2>IBI Return Package Logger</h2>
    <form id="return-form">
        
        <div class="form-group">
            <label for="platform">Platform</label>
            <select id="platform" name="platform" required>
                <option value="" disabled selected>Select Platform...</option>
                <option>Amazon</option> <option>Amazon Bazaar</option>
                <option>Flipkart</option> <option>Shopsy</option>
                <option>Meesho</option> <option>ShopClues</option> <option>IBI Website</option>
            </select>
        </div>

        <div class="form-group">
            <label for="courier">Courier Name</label>
            <select id="courier" name="courier" required>
                <option value="" disabled selected>Select Courier...</option>
                <option>Amazon ATS</option> <option>eKart</option> <option>Delhivery</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dateTime">System Entry Time (Auto-Locked)</label>
            <input type="datetime-local" id="dateTime" name="dateTime" class="locked-field" readonly required>
        </div>

        <div class="form-group">
            <label for="returnDate">Date of Return (Manual Selection)</label>
            <input type="date" id="returnDate" name="returnDate" required>
        </div>

        <div class="form-group">
            <label for="orderId">Order ID</label>
            <input type="text" id="orderId" name="orderId" placeholder="e.g. 404-1234567-8901234" required>
        </div>

        <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" name="productName" placeholder="Brief product description" required>
        </div>

        <div class="form-group">
            <label for="address">From Address</label>
            <textarea id="address" name="address" placeholder="Customer return address" required></textarea>
        </div>

        <div class="form-group">
            <label for="condition">Condition of Package</label>
            <select id="condition" name="condition" required>
                <option value="" disabled selected>Select Condition...</option>
                <option>Good</option> <option>Bad</option>
            </select>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Submit Return Data</button>
        <div id="status-message" class="message"></div>
    </form>

    <div class="history-section">
        <div class="history-header">
            <h3>Memory (Tap to Reuse)</h3>
            <button class="btn-clear" onclick="clearHistory()" id="clearBtn" style="display: none;">🗑️ Clear All</button>
        </div>
        <div id="history-list" class="history-list">
            </div>
    </div>
</div>

<script>
    // --- 1. Theme Toggle Logic ---
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        
        if (body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
            btn.innerText = '🌙 Dark Mode';
            localStorage.setItem('ibi_returns_theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️ Light Mode';
            localStorage.setItem('ibi_returns_theme', 'dark');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        try {
            const savedTheme = localStorage.getItem('ibi_returns_theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').innerText = '☀️ Light Mode';
            }
        } catch (e) { console.error("Local storage disabled", e); }
        
        setCurrentDateTime();
        document.getElementById('returnDate').valueAsDate = new Date();
        renderHistory();
    });

    // --- 2. System Time Logic ---
    function setCurrentDateTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateTime').value = now.toISOString().slice(0, 16);
    }

    // --- 3. Local Memory Logic ---
    const HISTORY_KEY = 'ibi_returns_memory';
    const MAX_HISTORY = 24;

    function renderHistory() {
        const list = document.getElementById('history-list');
        const clearBtn = document.getElementById('clearBtn');
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        
        if (history.length === 0) {
            clearBtn.style.display = 'none';
            list.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 16px; font-size: 14px;">No recent packages logged on this device yet.</div>';
            return;
        }

        clearBtn.style.display = 'block';
        list.innerHTML = '';
        
        history.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onclick = () => loadFromHistory(index);
            
            div.innerHTML = `
                <div class="history-item-top">
                    <span>📦 ${item.orderId}</span>
                    <span class="history-item-date">🗓️ ${item.returnDate}</span>
                </div>
                <div class="history-details">
                    <strong>Platform:</strong> ${item.platform} &nbsp;|&nbsp; <strong>Courier:</strong> ${item.courier}<br>
                    <strong>Product:</strong> ${item.productName}<br>
                    <strong>Condition:</strong> ${item.condition}
                </div>
                <div class="history-address">
                    <strong>From:</strong> ${item.address}
                </div>
            `;
            list.appendChild(div);
        });
    }

    function saveToHistory(dataObj) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        history.unshift(dataObj);
        if (history.length > MAX_HISTORY) history.pop(); 
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        renderHistory();
    }

    function loadFromHistory(index) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        let item = history[index];
        if(!item) return;

        document.getElementById('platform').value = item.platform || '';
        document.getElementById('courier').value = item.courier || '';
        document.getElementById('returnDate').value = item.returnDate || '';
        document.getElementById('orderId').value = item.orderId || '';
        document.getElementById('productName').value = item.productName || '';
        document.getElementById('address').value = item.address || '';
        document.getElementById('condition').value = item.condition || '';

        setCurrentDateTime();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearHistory() {
        if(confirm("Are you sure you want to clear all 24 saved entries? This cannot be undone.")) {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }
    }

    // --- 4. Database Submission Logic ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyPW84MZnqZ7bxuuI4f7We7ymB4xW9zZZOpUdhm0Jv-rXd_hAEs-J_8B_MeHczafHDLTQ/exec';
    
    const form = document.forms['return-form'];
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'SUBMITTING...';
        statusMessage.className = 'message';
        statusMessage.innerText = '';

        const formData = new FormData(form);
        formData.append('submissionTimestamp', new Date().toLocaleString());

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => response.json())
            .then(data => {
                statusMessage.innerText = 'SUCCESS! PACKAGE LOGGED.';
                statusMessage.className = 'message success';
                
                const currentData = {
                    platform: document.getElementById('platform').value,
                    courier: document.getElementById('courier').value,
                    returnDate: document.getElementById('returnDate').value,
                    orderId: document.getElementById('orderId').value,
                    productName: document.getElementById('productName').value,
                    address: document.getElementById('address').value,
                    condition: document.getElementById('condition').value
                };
                saveToHistory(currentData);

                submitBtn.disabled = false;
                submitBtn.innerText = 'SUBMIT RETURN DATA';
                form.reset();
                setCurrentDateTime();
                document.getElementById('returnDate').valueAsDate = new Date(); 
                
                setTimeout(() => { statusMessage.className = 'message'; }, 3000);
            })
            .catch(error => {
                console.error('Error!', error);
                statusMessage.innerText = 'ERROR SAVING DATA. PLEASE TRY AGAIN.';
                statusMessage.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.innerText = 'SUBMIT RETURN DATA';
            });
    });
</script>

</body>
</html>
