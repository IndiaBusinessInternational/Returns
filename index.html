<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Returns Logger</title>
    <style>
        :root {
            --primary: #0052cc;
            --background: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --border: #dfe1e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { margin-top: 0; text-align: center; font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 4px; box-sizing: border-box; font-size: 16px; font-family: inherit;
        }
        .locked-field {
            background-color: #ebecf0; color: #5e6c84; cursor: not-allowed; border: 1px solid #dfe1e6;
        }
        .locked-field:focus { outline: none; }
        textarea { resize: vertical; height: 80px; }
        
        button.btn-submit {
            width: 100%; padding: 14px; background-color: var(--primary); color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s;
        }
        button.btn-submit:hover { background-color: #0043a6; }
        button.btn-submit:disabled { background-color: #a5bdf0; cursor: not-allowed; }
        
        .message { margin-top: 16px; padding: 12px; border-radius: 4px; text-align: center; display: none; font-weight: bold; }
        .success { background-color: #e3fcef; color: #006644; display: block; }
        .error { background-color: #ffebe6; color: #bf2600; display: block; }

        /* --- Local History Memory Panel --- */
        .history-section { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 16px; }
        .history-section h3 { font-size: 13px; margin-bottom: 12px; color: #5e6c84; text-transform: uppercase; text-align: center; letter-spacing: 0.5px;}
        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 5px;}
        
        /* Custom Scrollbar for memory panel */
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 10px; }

        .history-item { 
            padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            background: #f8fafc; cursor: pointer; transition: 0.2s; 
        }
        .history-item:hover { border-color: var(--primary); background: #eff6ff; }
        .history-item-top { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); font-size: 14px;}
        .history-item-bottom { color: #64748b; margin-top: 4px; font-size: 12px;}
    </style>
</head>
<body>

<div class="form-container">
    <h2>Return Package Log</h2>
    <form id="return-form">
        
        <div class="form-group">
            <label for="platform">Platform</label>
            <select id="platform" name="platform" required>
                <option value="" disabled selected>Select Platform...</option>
                <option>Amazon</option> <option>Amazon Bazaar</option>
                <option>Flipkart</option> <option>Shopsy</option>
                <option>Meesho</option> <option>ShopClues</option> <option>IBI Website</option>
            </select>
        </div>

        <div class="form-group">
            <label for="courier">Courier Name</label>
            <select id="courier" name="courier" required>
                <option value="" disabled selected>Select Courier...</option>
                <option>Amazon ATS</option> <option>eKart</option> <option>Delhivery</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dateTime">System Entry Time (Auto-Locked)</label>
            <input type="datetime-local" id="dateTime" name="dateTime" class="locked-field" readonly required>
        </div>

        <div class="form-group">
            <label for="returnDate">Date of Return (Manual Selection)</label>
            <input type="date" id="returnDate" name="returnDate" required>
        </div>

        <div class="form-group">
            <label for="orderId">Order ID</label>
            <input type="text" id="orderId" name="orderId" placeholder="e.g. 404-1234567-8901234" required>
        </div>

        <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" name="productName" placeholder="Brief product description" required>
        </div>

        <div class="form-group">
            <label for="address">From Address</label>
            <textarea id="address" name="address" placeholder="Customer return address" required></textarea>
        </div>

        <div class="form-group">
            <label for="condition">Condition of Package</label>
            <select id="condition" name="condition" required>
                <option value="" disabled selected>Select Condition...</option>
                <option>Good</option> <option>Bad</option>
            </select>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Submit Return Data</button>
        <div id="status-message" class="message"></div>
    </form>

    <div class="history-section">
        <h3>Memory: Last 24 Entries (Tap to Reuse)</h3>
        <div id="history-list" class="history-list">
            </div>
    </div>
</div>

<script>
    const HISTORY_KEY = 'ibi_returns_memory';
    const MAX_HISTORY = 24;

    // Set the current Date & Time in the locked field
    function setCurrentDateTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateTime').value = now.toISOString().slice(0, 16);
    }
    setCurrentDateTime();
    document.getElementById('returnDate').valueAsDate = new Date();

    // -------------------------------------------------------------
    // LOCAL MEMORY LOGIC
    // -------------------------------------------------------------
    function renderHistory() {
        const list = document.getElementById('history-list');
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        
        if (history.length === 0) {
            list.innerHTML = '<div style="font-size: 13px; color: #a5adba; text-align: center; padding: 10px;">No recent packages logged on this device yet.</div>';
            return;
        }

        list.innerHTML = '';
        history.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onclick = () => loadFromHistory(index);
            div.innerHTML = `
                <div class="history-item-top">
                    <span>📦 ${item.orderId}</span>
                    <span>${item.platform}</span>
                </div>
                <div class="history-item-bottom">
                    ${item.courier} • ${item.productName} 
                </div>
            `;
            list.appendChild(div);
        });
    }

    function saveToHistory(dataObj) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        history.unshift(dataObj); // Push to top of list
        if (history.length > MAX_HISTORY) history.pop(); // Delete 25th entry
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        renderHistory();
    }

    function loadFromHistory(index) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        let item = history[index];
        if(!item) return;

        document.getElementById('platform').value = item.platform || '';
        document.getElementById('courier').value = item.courier || '';
        document.getElementById('returnDate').value = item.returnDate || '';
        document.getElementById('orderId').value = item.orderId || '';
        document.getElementById('productName').value = item.productName || '';
        document.getElementById('address').value = item.address || '';
        document.getElementById('condition').value = item.condition || '';

        // Generate a FRESH locked system time for the new duplicate entry
        setCurrentDateTime();
        
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize the history panel on load
    renderHistory();

    // -------------------------------------------------------------
    // SUBMISSION LOGIC
    // -------------------------------------------------------------
    // ⚠️ REPLACE WITH YOUR ACTUAL GOOGLE APPS SCRIPT URL:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyPW84MZnqZ7bxuuI4f7We7ymB4xW9zZZOpUdhm0Jv-rXd_hAEs-J_8B_MeHczafHDLTQ/exec';
    
    const form = document.forms['return-form'];
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Submitting...';
        statusMessage.className = 'message';
        statusMessage.innerText = '';

        const formData = new FormData(form);
        formData.append('submissionTimestamp', new Date().toLocaleString());

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => response.json())
            .then(data => {
                statusMessage.innerText = 'Success! Package logged.';
                statusMessage.className = 'message success';
                
                // Extract current form values as an object and save to Local Memory
                const currentData = {
                    platform: document.getElementById('platform').value,
                    courier: document.getElementById('courier').value,
                    returnDate: document.getElementById('returnDate').value,
                    orderId: document.getElementById('orderId').value,
                    productName: document.getElementById('productName').value,
                    address: document.getElementById('address').value,
                    condition: document.getElementById('condition').value
                };
                saveToHistory(currentData);

                // Reset form
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Return Data';
                form.reset();
                setCurrentDateTime();
                document.getElementById('returnDate').valueAsDate = new Date(); 
                
                setTimeout(() => { statusMessage.className = 'message'; }, 3000);
            })
            .catch(error => {
                console.error('Error!', error);
                statusMessage.innerText = 'Error saving data. Please try again.';
                statusMessage.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Return Data';
            });
    });
</script>

</body>
</html>
