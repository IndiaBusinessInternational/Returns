<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Returns Logger</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --border: #dfe1e6;
            --locked-bg: #ebecf0;
            --locked-text: #5e6c84;
            --history-bg: #f8fafc;
            --history-hover: #eff6ff;
        }
        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --locked-bg: #020617;
            --locked-text: #94a3b8;
            --history-bg: #0f172a;
            --history-hover: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 50px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- Theme Toggle Button --- */
        .header-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .form-container {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            transition: background-color 0.3s;
        }
        h2 { margin-top: 0; text-align: center; font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; opacity: 0.9;}
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 4px; box-sizing: border-box; font-size: 16px; font-family: inherit;
            background-color: var(--surface); color: var(--text); transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary);
        }

        .locked-field {
            background-color: var(--locked-bg); color: var(--locked-text); cursor: not-allowed; border: 1px solid var(--border);
        }
        textarea { resize: vertical; height: 80px; }
        
        button.btn-submit {
            width: 100%; padding: 14px; background-color: var(--primary); color: white;
            border: none; border-radius: 4px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s;
        }
        button.btn-submit:hover { background-color: var(--primary-hover); }
        button.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .message { margin-top: 16px; padding: 12px; border-radius: 4px; text-align: center; display: none; font-weight: bold; }
        .success { background-color: #e3fcef; color: #006644; display: block; }
        .error { background-color: #ffebe6; color: #bf2600; display: block; }

        /* --- Local History Memory Panel --- */
        .history-section { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 16px; }
        .history-section h3 { font-size: 13px; margin-bottom: 12px; color: var(--text); opacity: 0.7; text-transform: uppercase; text-align: center; letter-spacing: 0.5px;}
        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 5px;}
        
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 10px; }

        .history-item { 
            padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            background: var(--history-bg); cursor: pointer; transition: 0.2s; 
        }
        .history-item:hover { border-color: var(--primary); background: var(--history-hover); }
        .history-item-top { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); font-size: 14px;}
        .history-item-bottom { color: var(--text); opacity: 0.8; margin-top: 4px; font-size: 12px;}
    </style>
</head>
<body data-theme="light">

<div class="header-bar">
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
</div>

<div class="form-container">
    <h2>Return Package Log</h2>
    <form id="return-form">
        
        <div class="form-group">
            <label for="platform">Platform</label>
            <select id="platform" name="platform" required>
                <option value="" disabled selected>Select Platform...</option>
                <option>Amazon</option> <option>Amazon Bazaar</option>
                <option>Flipkart</option> <option>Shopsy</option>
                <option>Meesho</option> <option>ShopClues</option> <option>IBI Website</option>
            </select>
        </div>

        <div class="form-group">
            <label for="courier">Courier Name</label>
            <select id="courier" name="courier" required>
                <option value="" disabled selected>Select Courier...</option>
                <option>Amazon ATS</option> <option>eKart</option> <option>Delhivery</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dateTime">System Entry Time (Auto-Locked)</label>
            <input type="datetime-local" id="dateTime" name="dateTime" class="locked-field" readonly required>
        </div>

        <div class="form-group">
            <label for="returnDate">Date of Return (Manual Selection)</label>
            <input type="date" id="returnDate" name="returnDate" required>
        </div>

        <div class="form-group">
            <label for="orderId">Order ID</label>
            <input type="text" id="orderId" name="orderId" placeholder="e.g. 404-1234567-8901234" required>
        </div>

        <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" name="productName" placeholder="Brief product description" required>
        </div>

        <div class="form-group">
            <label for="address">From Address</label>
            <textarea id="address" name="address" placeholder="Customer return address" required></textarea>
        </div>

        <div class="form-group">
            <label for="condition">Condition of Package</label>
            <select id="condition" name="condition" required>
                <option value="" disabled selected>Select Condition...</option>
                <option>Good</option> <option>Bad</option>
            </select>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Submit Return Data</button>
        <div id="status-message" class="message"></div>
    </form>
